}

message ToolDetailOp {
  string id = 1;
  string description = 2;
  bool danger = 3;
  int32 granted_agent_count = 4;
  int32 recent_invocation_count = 5;
  double last_cost = 6;
  string manifest_version = 7;
  string schema_json = 8;          // Tier-1 schema
