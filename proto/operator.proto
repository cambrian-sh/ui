  string scope_summary = 3;
  double trust_score = 4;
  google.protobuf.Timestamp last_activity_at = 5;
  string last_state = 6;
}

message AgentDetailOp {
  string id = 1;
  string trait = 2;
  string scope_summary = 3;
  double trust_score = 4;
  google.protobuf.Timestamp last_activity_at = 5;
  string last_state = 6;
  string manifest_version = 7;
  string manifest_json = 8;
  string cognitive_fingerprint = 9;   // TraitCognitive only
  ScopeConfigOp scope = 10;
  double trust_score_ewma = 11;
  repeated string recent_verification_outcomes = 12;
  string last_error = 13;
  string last_successful_plan_id = 14;
}

message ListAgentsRequest {}
message ListAgentsResponse {
  repeated AgentSummaryOp agents = 1;
}
message GetAgentRequest {
