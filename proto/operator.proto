  string session_id = 3;
  string text = 4;
}

message InjectCorrectionRequest {
  string command_id = 1;
  string reason = 2;
  string session_id = 3;
  string instruction = 4; // lands inside the running plan (pause→replan→hot-swap→resume)
}

message TagMemoryRequest {
  string command_id = 1;
  string reason = 2;
  string doc_id = 3;
  string tag = 4;
  bool add = 5; // true = apply tag, false = remove
}

