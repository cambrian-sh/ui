}

// ── Scope ───────────────────────────────────────────────────────

message ScopeSummaryOp {
  string agent_id = 1;
  string effective_scope_summary = 2; // tag-count summary
  repeated string default_write_tags = 3;
  google.protobuf.Timestamp last_scope_change_at = 4;
}

message ScopeDetailOp {
  string agent_id = 1;
  ScopeConfigOp effective_scope = 2;
  repeated string default_write_tags = 3;
  ScopeConfigOp caller_scope = 4;
  int32 k_anonymity_floor = 5;
  repeated string scope_change_history = 6; // ISO timestamps + actor + before/after
}

message GetScopeRequest {
  string agent_id = 1;
}
