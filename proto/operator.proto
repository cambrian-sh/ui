}

message MCPServerDetailOp {
  string id = 1;
  string connection_state = 2;
  int32 tool_count = 3;
  google.protobuf.Timestamp last_health_check_at = 4;
  double default_price = 5;
  repeated string health_check_history = 6;
  repeated string discovered_tools = 7; // "mcp:<server>/<tool>"
}

message ListMCPServersRequest {}
